
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jump Game</title>
    <style>
        body { margin: 0; background: #050010; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; background: #000; }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let player = { x: 50, y: 0, w: 40, h: 40, dy: 0, jump: -12, grounded: false };
        let obstacle = { x: canvas.width, y: 0, w: 30, h: 50, speed: 6 };
        let gravity = 0.7;
        let score = 0;

        window.addEventListener('touchstart', () => {
            if (player.grounded) {
                player.dy = player.jump;
                player.grounded = false;
            }
        });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Gravity and Floor
            player.dy += gravity;
            player.y += player.dy;
            if (player.y + player.h > canvas.height - 20) {
                player.y = canvas.height - 20 - player.h;
                player.dy = 0;
                player.grounded = true;
            }

            // Move Obstacle
            obstacle.x -= obstacle.speed;
            if (obstacle.x < -obstacle.w) {
                obstacle.x = canvas.width;
                score++;
                obstacle.speed += 0.3; // Make it harder
            }
            obstacle.y = canvas.height - 20 - obstacle.h;

            // Collision Check
            if (player.x < obstacle.x + obstacle.w &&
                player.x + player.w > obstacle.x &&
                player.y < obstacle.y + obstacle.h &&
                player.y + player.h > obstacle.y) {
                alert("Game Over! Your Score: " + score);
                location.reload(); 
            }

            // Draw Everything
            ctx.fillStyle = "#00ffff"; 
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.fillStyle = "#ff0055"; 
            ctx.fillRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);
            ctx.fillStyle = "white";
            ctx.font = "20px Arial";
            ctx.fillText("Score: " + score, 20, 40);

            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
